spring.application.name=registro-ingreso-archivo-service
server.port=8090
app.auth.username=${APP_AUTH_USERNAME:admin}
app.auth.password=${APP_AUTH_PASSWORD:admin123}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5442/registro_ingreso_archivo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
services.administrativo.url=${ADMINISTRATIVO_SERVICE_URL:http://administrativo-service:8085}
services.expediente.url=${EXPEDIENTE_SERVICE_URL:http://expediente-hospitalizacion-service:8084}
