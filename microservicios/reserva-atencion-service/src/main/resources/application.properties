spring.application.name=reserva-atencion-service
server.port=8083
app.auth.username=${APP_AUTH_USERNAME:admin}
app.auth.password=${APP_AUTH_PASSWORD:admin123}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/reserva_atencion_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
services.paciente.url=${PACIENTE_SERVICE_URL:http://paciente-service:8081}
