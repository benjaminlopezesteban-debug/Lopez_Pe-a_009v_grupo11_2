spring.application.name=fichaClinica
server.port=8082

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ficha_clinica_db
spring.datasource.username=admin
spring.datasource.password=25706123aS.
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# URLs de microservicios externos (clientes Feign sin url en anotación)
spring.cloud.openfeign.client.config.estante.url=http://localhost:8086
spring.cloud.openfeign.client.config.paciente.url=http://localhost:8081

# Feign logs
logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.com.proyecto.fichaClinica.client=DEBUG
feign.client.config.default.loggerLevel=full

# Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO
